version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: thermopilot_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thermopilot}
      POSTGRES_USER: ${POSTGRES_USER:-thermopilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thermopilot_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thermopilot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: thermopilot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermopilot_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thermopilot}:${POSTGRES_PASSWORD:-thermopilot_secret}@db:5432/${POSTGRES_DB:-thermopilot}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermopilot_worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-thermopilot}:${POSTGRES_PASSWORD:-thermopilot_secret}@db:5432/${POSTGRES_DB:-thermopilot}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thermopilot_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
