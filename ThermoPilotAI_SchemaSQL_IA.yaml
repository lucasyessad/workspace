      organization_id: uuid fk organizations.id not_null
      task_id: uuid fk tasks.id
      workflow_run_id: uuid
      run_type: varchar(80) not_null
      status: varchar(50) not_null
      started_at: timestamptz
      finished_at: timestamptz
      input_payload: jsonb default '{}'
      output_payload: jsonb default '{}'
      error_payload: jsonb default '{}'
      created_at: timestamptz not_null
      updated_at: timestamptz not_null

  integrations:
    columns:
      id: uuid pk
      organization_id: uuid fk organizations.id not_null
      integration_type: varchar(80) not_null
      name: varchar(255) not_null
      status: varchar(50) not_null
      config_public: jsonb default '{}'
      config_secret_ref: varchar(255)
      created_at: timestamptz not_null
      updated_at: timestamptz not_null

  webhooks:
    columns:
      id: uuid pk
      organization_id: uuid fk organizations.id not_null
      direction: varchar(20) not_null
      event_code: varchar(120) not_null
      target_url: text
      secret_ref: varchar(255)
      status: varchar(50) not_null
      created_at: timestamptz not_null
      updated_at: timestamptz not_null

  automation_workflows:
    columns:
      id: uuid pk
      organization_id: uuid fk organizations.id not_null
      name: varchar(255) not_null
      workflow_type: varchar(80) not_null
      status: varchar(50) not_null
      trigger_config: jsonb default '{}'
      created_at: timestamptz not_null
      updated_at: timestamptz not_null

  workflow_runs:
    columns:
      id: uuid pk
      workflow_id: uuid fk automation_workflows.id not_null
      status: varchar(50) not_null
      started_at: timestamptz
      finished_at: timestamptz
      input_payload: jsonb default '{}'
      output_payload: jsonb default '{}'
      created_at: timestamptz not_null
      updated_at: timestamptz not_null

  workflow_steps:
    columns:
      id: uuid pk
      workflow_id: uuid fk automation_workflows.id not_null
      step_code: varchar(80) not_null
      step_type: varchar(80) not_null
      sort_order: integer not_null
