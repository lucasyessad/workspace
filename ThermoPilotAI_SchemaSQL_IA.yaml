      created_at: timestamptz not_null

  ref_priorities:
    columns:
      id: uuid pk
      code: varchar(40) unique not_null
      label: varchar(120) not_null
      sort_order: integer not_null
      created_at: timestamptz not_null

task_persistence_protocol:
  current_state_tables:
    - tasks
    - task_checklists
    - task_dependencies
    - task_artifacts
  immutable_history_tables:
    - task_status_history
    - entity_change_log
    - activity_logs
  context_resume_tables:
    - task_session_snapshots
    - checkpoints
  execution_trace_tables:
    - execution_runs
    - workflow_runs
    - workflow_step_runs
  resume_algorithm:
    - load task
    - load latest snapshot ordered by created_at desc
    - load open dependencies
    - load artifacts
    - load last status transitions
    - infer next actionable step from next_action and unresolved checklist items
  mandatory_snapshot_triggers:
    - task status changes to review
    - task status changes to done
    - end of ai execution session
    - before major entity refactor
  anti_duplication_rules:
    - never restart a done task without creating a new child task or reopening with reason
    - attach produced files through task_artifacts
    - require change log entry on all important entity changes

recommended_views:
  - vw_active_tasks_by_workspace
  - vw_blocked_tasks
  - vw_latest_task_snapshot
  - vw_audit_latest_version
  - vw_scenario_financial_summary
  - vw_building_energy_baseline

