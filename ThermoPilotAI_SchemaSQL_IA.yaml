      id: uuid pk
      workflow_run_id: uuid fk workflow_runs.id not_null
      workflow_step_id: uuid fk workflow_steps.id not_null
      status: varchar(50) not_null
      started_at: timestamptz
      finished_at: timestamptz
      input_payload: jsonb default '{}'
      output_payload: jsonb default '{}'
      error_payload: jsonb default '{}'
      created_at: timestamptz not_null
      updated_at: timestamptz not_null

  ref_energy_types:
    columns:
      id: uuid pk
      code: varchar(40) unique not_null
      label: varchar(120) not_null
      created_at: timestamptz not_null

  ref_system_types:
    columns:
      id: uuid pk
      code: varchar(40) unique not_null
      label: varchar(120) not_null
      created_at: timestamptz not_null

  ref_measure_types:
    columns:
      id: uuid pk
      code: varchar(40) unique not_null
      label: varchar(120) not_null
      created_at: timestamptz not_null

  ref_document_types:
    columns:
      id: uuid pk
      code: varchar(40) unique not_null
      label: varchar(120) not_null
      created_at: timestamptz not_null

  ref_task_statuses:
    columns:
      id: uuid pk
      code: varchar(40) unique not_null
      label: varchar(120) not_null
