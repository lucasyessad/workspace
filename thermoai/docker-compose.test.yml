# =============================================================
# ThermoAI — Docker Compose Test
# Environnement isolé pour les tests d'intégration
# =============================================================

services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thermopilot_test
      POSTGRES_USER: thermopilot
      POSTGRES_PASSWORD: thermopilot_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermopilot -d thermopilot_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
