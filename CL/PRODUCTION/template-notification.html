<!DOCTYPE html>
<html lang="fr" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--[if mso]>
  <noscript><xml>
    <o:OfficeDocumentSettings>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml></noscript>
  <![endif]-->
  <title>{{JOB_NAME}} &mdash; {{STATUS_LABEL}}</title>
  <style>
    body { margin:0; padding:0; background-color:#EDEEEE; }
    table { mso-table-lspace:0pt; mso-table-rspace:0pt; border-collapse:collapse; }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#EDEEEE;">

<table width="100%" cellpadding="0" cellspacing="0" border="0"
       bgcolor="#EDEEEE" style="background-color:#EDEEEE;">
  <tr>
    <td style="padding:20px 12px;">

      <!-- Carte principale -->
      <table width="100%" cellpadding="0" cellspacing="0" border="0"
             bgcolor="#FFFFFF" style="background-color:#FFFFFF;border-top:4px solid #00A8A8;">
        <tr>
          <td>
            <table width="100%" cellpadding="0" cellspacing="0" border="0">

              <!-- HEADER CLAIR : fond blanc, bordure teal CL en haut -->
              <tr>
                <td style="padding:20px 24px 16px 24px;border-bottom:1px solid #EDEEEE;">
                  <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td style="vertical-align:middle;">
                        <div style="font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:11px;font-weight:bold;color:#00A8A8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">INEO &mdash; Exploitation</div>
                        <div style="font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:15px;font-weight:bold;color:#2B2B2B;">{{JOB_NAME}}</div>
                        <div style="font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:11px;color:#6B7070;margin-top:4px;">{{DATE}} &agrave; {{HEURE}}</div>
                      </td>
                      <td align="right" style="vertical-align:top;white-space:nowrap;">
                        <table cellpadding="0" cellspacing="0" border="0">
                          <tr>
                            <td align="center" style="border:1px solid #00A8A8;padding:3px 10px;">
                              <span style="font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:10px;font-weight:bold;color:#00A8A8;text-transform:uppercase;letter-spacing:0.6px;">{{ENVIRONNEMENT}}</span>
                            </td>
                          </tr>
                          <tr>
                            <td height="8" style="font-size:0;line-height:8px;">&nbsp;</td>
                          </tr>
                          <tr>
                            <td align="center" bgcolor="{{STATUS_COLOR}}" style="background-color:{{STATUS_COLOR}};padding:4px 10px;">
                              <span style="font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:12px;font-weight:bold;color:#FFFFFF;text-transform:uppercase;letter-spacing:0.7px;">{{STATUS_LABEL}}</span>
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- BANDE STATUT (couleur dynamique) -->
              <tr>
                <td height="3" bgcolor="{{STATUS_COLOR}}"
                    style="background-color:{{STATUS_COLOR}};font-size:0;line-height:3px;mso-line-height-rule:exactly;">&nbsp;</td>
              </tr>

              <!-- BLOC STATUT : fond trčs clair, message seul -->
              <tr>
                <td bgcolor="#F7FAFA" style="background-color:#F7FAFA;padding:16px 24px;border-left:4px solid {{STATUS_COLOR}};font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:13px;color:#2B2B2B;line-height:1.55;">{{STATUS_MESSAGE}}</td>
              </tr>

              <!-- SÉPARATEUR -->
              <tr>
                <td height="1" bgcolor="#EDEEEE" style="background-color:#EDEEEE;font-size:0;line-height:1px;">&nbsp;</td>
              </tr>

              <!-- SECTIONS DYNAMIQUES -->
              {{SECTIONS}}

              <!--MESSAGE_LIBRE_START-->
              <tr>
                <td bgcolor="#F7FAFA" style="background-color:#F7FAFA;padding:16px 24px;border-left:4px solid #00A8A8;font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:13px;color:#2B2B2B;line-height:1.55;">{{MESSAGE_LIBRE_TEXT}}</td>
              </tr>
              <!--MESSAGE_LIBRE_END-->

              <!-- SÉPARATEUR -->
              <tr>
                <td height="1" bgcolor="#C8CACA" style="background-color:#C8CACA;font-size:0;line-height:1px;mso-line-height-rule:exactly;">&nbsp;</td>
              </tr>

              <!-- SIGNATURE -->
              <tr>
                <td style="padding:14px 24px 16px 24px;font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:13px;color:#2B2B2B;line-height:1.8;">
                  Cordialement,<br>
                  <strong style="color:#2B2B2B;">{{EQUIPE}}</strong>
                </td>
              </tr>

              <!-- SÉPARATEUR FOOTER -->
              <tr>
                <td height="3" bgcolor="#00A8A8" style="background-color:#00A8A8;font-size:0;line-height:3px;mso-line-height-rule:exactly;">&nbsp;</td>
              </tr>

              <!--FOOTER_START-->
              <tr>
                <td bgcolor="#F0F5F5" style="background-color:#F0F5F5;padding:10px 24px;font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:10px;color:#6B7070;line-height:1.6;">
                  Message g&eacute;n&eacute;r&eacute; automatiquement &mdash; Merci de ne pas r&eacute;pondre &agrave; cet email.<br>
                  Serveur&nbsp;: <strong style="color:#2B2B2B;">{{HOSTNAME}}</strong> &nbsp;&bull;&nbsp; {{DATE}} &agrave; {{HEURE}}
                </td>
              </tr>
              <!--FOOTER_END-->

            </table>
          </td>
        </tr>
      </table>

    </td>
  </tr>
</table>

</body>
</html>
