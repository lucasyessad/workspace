<!DOCTYPE html>
<html lang="fr" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <!--[if mso]>
  <noscript><xml>
    <o:OfficeDocumentSettings>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml></noscript>
  <![endif]-->
  <title>{{JOB_NAME}} - {{STATUS_LABEL}}</title>
  <style>
    body { margin:0; padding:0; background-color:#EDEEEE; }
    table { mso-table-lspace:0pt; mso-table-rspace:0pt; }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#EDEEEE;">

<table width="100%" cellpadding="0" cellspacing="0" border="0"
       bgcolor="#EDEEEE" style="background-color:#EDEEEE;">
  <tr>
    <td style="padding:16px 10px;">

<table width="100%" cellpadding="0" cellspacing="1" border="0"
       bgcolor="#C8CACA" style="width:100%;">
  <tr>
    <td bgcolor="#FFFFFF" style="background-color:#FFFFFF;">

      <table width="100%" cellpadding="0" cellspacing="0" border="0">

        <tr>
          <td bgcolor="{{STATUS_COLOR}}" height="4"
              style="background-color:{{STATUS_COLOR}};font-size:0;line-height:4px;mso-line-height-rule:exactly;">&nbsp;</td>
        </tr>

        <tr>
          <td bgcolor="#2B2B2B" style="background-color:#2B2B2B;padding:16px 22px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:14px;font-weight:bold;color:#FFFFFF;vertical-align:middle;">
                  {{JOB_NAME}}
                </td>
                <td style="font-size:0;width:10px;">&nbsp;</td>
                <td width="1" nowrap bgcolor="#00A8A8" style="background-color:#00A8A8;padding:3px 9px;vertical-align:middle;white-space:nowrap;">
                  <span style="font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:10px;font-weight:bold;color:#2B2B2B;letter-spacing:0.5px;text-transform:uppercase;">{{ENVIRONNEMENT}}</span>
                </td>
              </tr>
              <tr>
                <td colspan="3" style="font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:11px;color:#9ECECE;padding-top:5px;">
                  {{DATE}} &agrave; {{HEURE}}
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <tr>
          <td style="padding:20px 22px 16px 22px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td>
                  <table width="100%" cellpadding="0" cellspacing="0" border="0"
                         bgcolor="{{STATUS_COLOR}}" style="background-color:{{STATUS_COLOR}};">
                    <tr><td colspan="3" height="1" style="font-size:0;line-height:1px;">&nbsp;</td></tr>
                    <tr>
                      <td width="5" style="font-size:0;">&nbsp;</td>
                      <td bgcolor="#F7FAFA" style="background-color:#F7FAFA;padding:18px 20px;">
                        <table cellpadding="0" cellspacing="0" border="0">
                          <tr>
                            <td bgcolor="{{STATUS_COLOR}}" style="background-color:{{STATUS_COLOR}};padding:5px 14px;vertical-align:middle;white-space:nowrap;">
                              <span style="font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:13px;font-weight:bold;color:#FFFFFF;text-transform:uppercase;letter-spacing:0.7px;">{{STATUS_LABEL}}</span>
                            </td>
                            <td width="16" style="font-size:0;">&nbsp;</td>
                            <td style="font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:14px;color:#2B2B2B;vertical-align:middle;line-height:1.4;">
                              {{STATUS_MESSAGE}}
                            </td>
                          </tr>
                        </table>
                      </td>
                      <td width="1" style="font-size:0;">&nbsp;</td>
                    </tr>
                    <tr><td colspan="3" height="1" style="font-size:0;line-height:1px;">&nbsp;</td></tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        {{SECTIONS}}

        <tr>
          <td height="1" bgcolor="#C8CACA"
              style="background-color:#C8CACA;font-size:0;line-height:1px;mso-line-height-rule:exactly;">&nbsp;</td>
        </tr>
        <tr>
          <td bgcolor="#F0F5F5" style="background-color:#F0F5F5;padding:10px 22px;font-family:Calibri,'Segoe UI',Arial,sans-serif;font-size:10px;color:#6B7070;">
            Message g&eacute;n&eacute;r&eacute; automatiquement &mdash; Ne pas r&eacute;pondre &agrave; cet email.
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>

    </td>
  </tr>
</table>

</body>
</html>
