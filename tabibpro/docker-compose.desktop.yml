version: '3.8'

# ============================================================
# TabibPro — Docker Compose Desktop
# Usage local : Windows & macOS via Docker Desktop
# ============================================================

name: tabibpro-desktop

services:

  # ---- Backend API (NestJS) ----
  api:
    image: tabibpro/api:latest
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: tabibpro-desktop-api
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - DEFAULT_LOCALE=fr
      - SUPPORTED_LOCALES=fr,ar,ber,en
      - DEFAULT_TIMEZONE=Africa/Algiers
      - DEFAULT_CURRENCY=DZD
      - COUNTRY=DZ
      - WEEKEND_DAYS=5,6
      - DB_MEDICAL_HOST=postgres-medical
      - DB_SERVICE_HOST=postgres-service
      - REDIS_HOST=redis
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
    ports:
      - "3001:3001"
    depends_on:
      postgres-medical:
        condition: service_healthy
      postgres-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - app_logs:/app/logs
    networks:
      - tabibpro-desktop
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- Frontend IHM Pro (Next.js) ----
  app:
    image: tabibpro/app:latest
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    container_name: tabibpro-desktop-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_DEFAULT_LOCALE=fr
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - tabibpro-desktop
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Portail Patient (Next.js) ----
  patient-portal:
    image: tabibpro/patient-portal:latest
    build:
      context: ./apps/patient-portal
      dockerfile: Dockerfile
      target: production
    container_name: tabibpro-desktop-patient
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_PORTAL_URL=http://localhost:3002
      - NEXT_PUBLIC_DEFAULT_LOCALE=fr
    ports:
      - "3002:3000"
    depends_on:
      - api
    networks:
      - tabibpro-desktop

  # ---- Base de données médicale (pgvector) ----
  postgres-medical:
    image: pgvector/pgvector:pg17
    container_name: tabibpro-desktop-pg-medical
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_MEDICAL_NAME:-tabibpro_medical}
      - POSTGRES_USER=${DB_MEDICAL_USER:-tabibpro}
      - POSTGRES_PASSWORD=${DB_MEDICAL_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pg_medical:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tabibpro-desktop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_MEDICAL_USER:-tabibpro} -d ${DB_MEDICAL_NAME:-tabibpro_medical}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=512MB
        -c work_mem=8MB
        -c maintenance_work_mem=64MB

  # ---- Base de données service ----
  postgres-service:
    image: postgres:17-alpine
    container_name: tabibpro-desktop-pg-service
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_SERVICE_NAME:-tabibpro_service}
      - POSTGRES_USER=${DB_SERVICE_USER:-tabibpro}
      - POSTGRES_PASSWORD=${DB_SERVICE_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pg_service:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - tabibpro-desktop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SERVICE_USER:-tabibpro} -d ${DB_SERVICE_NAME:-tabibpro_service}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis (cache, sessions, queues) ----
  redis:
    image: redis:7-alpine
    container_name: tabibpro-desktop-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - tabibpro-desktop
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Meilisearch (recherche — supporte l'arabe) ----
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: tabibpro-desktop-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_API_KEY}
      - MEILI_ENV=production
      - MEILI_DB_PATH=/meili_data
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - tabibpro-desktop

  # ---- MinIO (stockage fichiers) ----
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: tabibpro-desktop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - tabibpro-desktop

  # ---- Worker BullMQ ----
  worker:
    image: tabibpro/api:latest
    container_name: tabibpro-desktop-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - APP_MODE=worker
      - DB_MEDICAL_HOST=postgres-medical
      - DB_SERVICE_HOST=postgres-service
      - REDIS_HOST=redis
    command: ["node", "dist/main-worker.js"]
    depends_on:
      - postgres-medical
      - redis
    networks:
      - tabibpro-desktop

volumes:
  pg_medical:
  pg_service:
  redis_data:
  meili_data:
  minio_data:
  app_logs:

networks:
  tabibpro-desktop:
    driver: bridge
