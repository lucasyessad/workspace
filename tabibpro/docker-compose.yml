version: '3.8'

# ============================================================
# TabibPro — Docker Compose
# Déploiement local complet — Édition Algérie
# ============================================================

name: tabibpro

services:

  # ---- Application Backend (NestJS) ----
  api:
    image: tabibpro/api:latest
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: medgest-api
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - DEFAULT_LOCALE=fr
      - SUPPORTED_LOCALES=fr,ar,ber,en
      - DEFAULT_TIMEZONE=Africa/Algiers
      - DEFAULT_CURRENCY=DZD
      - COUNTRY=DZ
      - WEEKEND_DAYS=5,6
      - DB_MEDICAL_HOST=postgres-medical
      - DB_SERVICE_HOST=postgres-service
      - REDIS_HOST=redis
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MINIO_ENDPOINT=minio
    ports:
      - "3001:3001"
    depends_on:
      postgres-medical:
        condition: service_healthy
      postgres-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - app_logs:/app/logs
    networks:
      - medgest-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- Application Frontend IHM Pro (Next.js) ----
  app:
    image: tabibpro/app:latest
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    container_name: medgest-app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.tabibpro.dz
      - NEXT_PUBLIC_APP_URL=https://app.tabibpro.dz
      - NEXT_PUBLIC_DEFAULT_LOCALE=fr
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - medgest-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Portail Patient (Next.js) ----
  patient-portal:
    image: tabibpro/patient-portal:latest
    build:
      context: ./apps/patient-portal
      dockerfile: Dockerfile
      target: production
    container_name: medgest-patient
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.tabibpro.dz
      - NEXT_PUBLIC_PORTAL_URL=https://patient.tabibpro.dz
      - NEXT_PUBLIC_DEFAULT_LOCALE=fr
    ports:
      - "3002:3000"
    depends_on:
      - api
    networks:
      - medgest-internal

  # ---- Base de données médicale (LOCAL — données sensibles) ----
  postgres-medical:
    image: pgvector/pgvector:pg17
    container_name: medgest-pg-medical
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_MEDICAL_NAME:-tabibpro_medical}
      - POSTGRES_USER=${DB_MEDICAL_USER:-medgest}
      - POSTGRES_PASSWORD=${DB_MEDICAL_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pg_medical:/var/lib/postgresql/data
      - ./docker/init/medical:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - medgest-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_MEDICAL_USER:-medgest} -d ${DB_MEDICAL_NAME:-tabibpro_medical}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c wal_level=replica
        -c max_wal_senders=3
        -c archive_mode=on
        -c archive_command='cp %p /var/lib/postgresql/data/archive/%f'
        -c log_min_duration_statement=1000

  # ---- Base de données service (LOCAL ou CLOUD selon config) ----
  postgres-service:
    image: postgres:17-alpine
    container_name: medgest-pg-service
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_SERVICE_NAME:-tabibpro_service}
      - POSTGRES_USER=${DB_SERVICE_USER:-medgest}
      - POSTGRES_PASSWORD=${DB_SERVICE_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pg_service:/var/lib/postgresql/data
      - ./docker/init/service:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    networks:
      - medgest-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SERVICE_USER:-medgest} -d ${DB_SERVICE_NAME:-tabibpro_service}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - local-service  # Désactivé si CLOUD_MODE=enabled et cloud configuré

  # ---- Redis (cache, sessions, queues) ----
  redis:
    image: redis:7-alpine
    container_name: medgest-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - medgest-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Meilisearch (recherche instantanée — supporte l'arabe) ----
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: medgest-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_API_KEY}
      - MEILI_ENV=production
      - MEILI_DB_PATH=/meili_data
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - medgest-internal

  # ---- MinIO (stockage fichiers — compatible S3) ----
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: medgest-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - medgest-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---- Reverse Proxy (Traefik) ----
  traefik:
    image: traefik:v3.2
    container_name: medgest-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@tabibpro.dz"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - medgest-internal
      - medgest-external

  # ---- Sauvegarde automatique ----
  backup:
    image: tabibpro/backup:latest
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
    container_name: tabibpro-backup
    restart: unless-stopped
    environment:
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}
      - DB_MEDICAL_URL=${DB_MEDICAL_URL}
      - DB_SERVICE_URL=${DB_SERVICE_URL}
      - RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - NOTIFY_EMAIL=${EMAIL_FROM}
    volumes:
      - pg_medical:/source/pg_medical:ro
      - pg_service:/source/pg_service:ro
      - minio_data:/source/files:ro
      - ${BACKUP_PATH:-/tmp/tabibpro-backup}:/backups
    depends_on:
      - postgres-medical
      - postgres-service
    networks:
      - medgest-internal

  # ---- Worker BullMQ (tâches asynchrones) ----
  worker:
    image: tabibpro/api:latest
    container_name: medgest-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - APP_MODE=worker
      - DB_MEDICAL_HOST=postgres-medical
      - DB_SERVICE_HOST=postgres-service
      - REDIS_HOST=redis
    command: ["node", "dist/main-worker.js"]
    depends_on:
      - postgres-medical
      - redis
    networks:
      - medgest-internal

# ---- Volumes persistants ----
volumes:
  pg_medical:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/pg_medical
  pg_service:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/pg_service
  redis_data:
    driver: local
  meili_data:
    driver: local
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/minio
  app_logs:
    driver: local
  traefik_certs:
    driver: local

# ---- Réseaux ----
networks:
  medgest-internal:
    driver: bridge
    internal: true
  medgest-external:
    driver: bridge
